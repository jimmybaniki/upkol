<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publier Actualité - Rectorat UPKOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-4">
                <a href="dashboard.html" class="w-10 h-10 bg-white shadow-sm rounded-full flex items-center justify-center text-gray-600 hover:text-yellow-500 transition-colors">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="text-2xl font-black uppercase text-gray-800">Publier une <span class="text-yellow-500">Actualité</span></h1>
            </div>
            <div class="hidden md:block text-right">
                <p class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Espace Rectorat</p>
                <p class="text-xs font-bold text-gray-600">UPKOL KOLWEZI</p>
            </div>
        </div>

        <!-- Form Content -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <div class="bg-gray-900 p-6 text-white flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold">Nouvel Article / Annonce</h2>
                    <p class="text-xs text-gray-400">Diffusion immédiate sur le site web et le portail étudiant</p>
                </div>
                <i class="fas fa-bullhorn text-yellow-500 text-3xl opacity-50"></i>
            </div>

            <form id="newsForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Titre de l'actualité *</label>
                            <input type="text" id="newsTitle" required placeholder="Ex: Report de la rentrée académique" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl text-sm focus:outline-yellow-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Catégorie</label>
                            <select class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl text-sm focus:outline-yellow-500 transition-all cursor-pointer">
                                <option>Avis Académique</option>
                                <option>Événement</option>
                                <option>Communiqué du Rectorat</option>
                                <option>Recherche & Innovation</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Image de couverture</label>
                        <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors cursor-pointer group">
                            <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 group-hover:text-yellow-500 mb-2"></i>
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Cliquez pour ajouter une photo</p>
                            <input type="file" class="hidden">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Contenu de l'annonce *</label>
                    <textarea rows="6" id="newsContent" required placeholder="Rédigez votre communiqué ici..." class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl text-sm focus:outline-yellow-500 transition-all"></textarea>
                </div>

                <div class="flex items-center space-x-3 p-4 bg-yellow-50 border border-yellow-100 rounded-xl">
                    <input type="checkbox" id="urgent" class="w-4 h-4 text-yellow-500 border-gray-300 rounded focus:ring-yellow-500">
                    <label for="urgent" class="text-xs font-bold text-yellow-800 uppercase tracking-tighter">Marquer comme URGENT (Notification Push)</label>
                </div>

                <div class="flex justify-end space-x-4 pt-4 border-t border-gray-100">
                    <button type="button" onclick="window.location.href='dashboard.html'" class="px-6 py-3 text-xs font-black uppercase text-gray-400 hover:text-gray-800 transition-colors">
                        Annuler
                    </button>
                    <button type="submit" class="bg-gray-900 text-yellow-500 px-10 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-gray-800 transition-all shadow-lg flex items-center">
                        <i class="fas fa-paper-plane mr-2"></i> Publier l'article
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('newsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Publication...';
            btn.disabled = true;

            setTimeout(() => {
                alert('Actualité publiée avec succès sur toutes les plateformes UPKOL !');
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
