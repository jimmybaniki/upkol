<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Annuel - UPKOL</title>
    <link rel="icon" href="favicon.png?v=2" type="image/png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        upkol: {
                            jaune: '#FFD700',
                            noir: '#121212'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- HEADER -->
    <header class="bg-white shadow-sm h-16 flex items-center justify-between px-4 lg:px-8 z-10">
        <div class="flex items-center">
            <a href="dashboard.html" class="flex items-center space-x-3">
                <i class="fas fa-arrow-left text-gray-600 hover:text-upkol-noir mr-4"></i>
                <h1 class="text-sm lg:text-lg font-black uppercase text-gray-800">Budget <span class="text-upkol-jaune">Annuel</span></h1>
            </a>
        </div>

        <div class="flex items-center space-x-4">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-bold text-gray-900">Prof. Mbuyi</p>
                <p class="text-[10px] font-bold text-upkol-jaune uppercase tracking-widest">Recteur</p>
            </div>
            <div class="w-10 h-10 rounded-full border-2 border-upkol-jaune bg-gray-200 flex items-center justify-center text-gray-500 font-bold overflow-hidden">
                <i class="fas fa-user-shield"></i>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-grow overflow-y-auto p-4 lg:p-8">
        <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-black uppercase mb-6 text-gray-800">Gestion du Budget Annuel</h2>
            <p class="text-gray-600 mb-8">
                Cette page permet de consulter et de gérer le budget annuel de l'université.
                Vous pouvez visualiser les allocations, les dépenses et les prévisions.
            </p>

            <form class="space-y-6">
                <div>
                    <label for="annee-budget" class="block text-sm font-bold text-gray-700 mb-2">Année Budgétaire</label>
                    <select id="annee-budget" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-lg text-sm focus:outline-upkol-jaune">
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                    </select>
                </div>
                <div>
                    <label for="departement-budget" class="block text-sm font-bold text-gray-700 mb-2">Département/Faculté</label>
                    <select id="departement-budget" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-lg text-sm focus:outline-upkol-jaune">
                        <option value="general">Budget Général</option>
                        <option value="informatique">Sciences Informatiques</option>
                        <option value="medecine">Sciences de la Santé</option>
                        <option value="droit">Faculté de Droit</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-upkol-jaune text-black font-black py-3 rounded-lg hover:bg-upkol-noir hover:text-white transition-all uppercase tracking-widest">
                    Afficher le Budget <i class="fas fa-chart-pie ml-2"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-upkol-noir text-white py-4 px-6 text-center text-xs">
        <p>&copy; 2024 UPKOL - Tous droits réservés.</p>
    </footer>

</body>
</html>
